<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | PC Speed Test</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(69, 208, 255, 0.14), transparent 28%),
          radial-gradient(circle at 80% 15%, rgba(64, 242, 176, 0.1), transparent 24%),
          linear-gradient(180deg, #07111b 0%, #091621 100%);
        color: #edf7ff;
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: rgba(14, 30, 47, 0.9);
        border: 1px solid rgba(111, 164, 204, 0.18);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #45d0ff;
        font-size: 0.84rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 0.95;
      }

      p {
        margin: 18px 0 0;
        color: #96b3ca;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: linear-gradient(135deg, #45d0ff, #7fe4ff);
        color: #06101a;
      }

      .secondary {
        border: 1px solid rgba(150, 179, 202, 0.24);
        color: #edf7ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">404 Error</p>
      <h1>That page does not exist.</h1>
      <p>
        The page you tried to open could not be found. Return to the main PC Speed Test landing page
        or contact the project owner if you need a direct link.
      </p>
      <div class="actions">
        <a class="primary" href="/">Back to Home</a>
        <a class="secondary" href="mailto:tranthienthanh93@gmail.com">Contact</a>
      </div>
    </main>
  </body>
</html>
